<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1959B9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ciftci Takip">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Ciftci Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f0;color:#222;font-size:15px;padding-bottom:env(safe-area-inset-bottom)}
.hdr{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10}
.hdr h1{font-size:18px;font-weight:700}.hdr p{font-size:11px;opacity:.8;margin-top:2px}
.cnt{padding:12px 12px calc(70px + env(safe-area-inset-bottom,0px))}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #ddd;display:flex;z-index:10;overflow-x:auto;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav a{flex:0 0 46px;padding:6px 1px 8px;font-size:8px;color:#999;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav a.on{color:#27ae60}.nav a .ic{font-size:19px;line-height:1}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ct{font-size:11px;font-weight:700;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mc{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mc .l{font-size:11px;color:#888;margin-bottom:4px}.mc .v{font-size:22px;font-weight:700}
.fc{grid-column:1/-1}
.li{padding:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.li:last-child{border-bottom:none}.mn{font-weight:600;font-size:14px}.sb{font-size:12px;color:#888;margin-top:2px}
.rt{text-align:right}.at{font-weight:700;font-size:15px}
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));right:16px;width:54px;height:54px;border-radius:50%;background:#27ae60;color:#fff;border:none;font-size:28px;box-shadow:0 4px 14px rgba(39,174,96,.5);cursor:pointer;z-index:9;display:none;align-items:center;justify-content:center}
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:50;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sh{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 40px;max-height:88vh;overflow-y:auto}
.sh h2{font-size:17px;font-weight:700;margin-bottom:16px}
.fr{margin-bottom:13px}.fr label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600}
.fi{width:100%;padding:11px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;background:#fff;display:block;-webkit-appearance:none}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;display:block;text-align:center}
.bg{background:#27ae60;color:#fff}.br{background:#e74c3c;color:#fff}.bk{background:#eee;color:#444}
.b2{background:#2980b9;color:#fff}.b3{background:#8e44ad;color:#fff}.b4{background:#e67e22;color:#fff}.b5{background:#7f8c8d;color:#fff}
.em{text-align:center;padding:36px 16px;color:#bbb}
.ts{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.ts.on{opacity:1}
.sc2{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sc2 h2{font-size:15px;font-weight:700}.ab{background:#27ae60;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}
.tip-btn{flex:1;padding:10px;border-radius:8px;border:2px solid #ddd;background:#fff;color:#555;font-weight:700;cursor:pointer;font-size:14px}
.tip-btn.on{border-color:#27ae60;background:#27ae60;color:#fff}
.ozet-kart{background:#e8f8f0;border-radius:8px;padding:10px;text-align:center;margin-top:8px;font-size:13px;color:#27ae60}
</style>
</head>
<body>
<div class="hdr" style="position:relative"><div style="text-align:center"><select id="yilSec" onchange="yilDegistir(this.value)" style="background:rgba(0,0,0,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700;cursor:pointer;position:absolute;top:14px;left:50%;transform:translateX(-50%)"></select></div><h1>Ciftci Takip <span style="font-size:11px;opacity:0.7;font-weight:400">v4.0</span></h1><div style="position:absolute;top:8px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span id="offlineBar" style="display:none;background:rgba(220,50,50,0.9);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700">&#10005; Cevrimdisi</span><button onclick="aramaAc()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent">&#128269;</button></div><p id="sub" style="font-size:11px;opacity:0.8;margin-top:2px">Yukleniyor...</p></div>
<div class="cnt" id="cnt"></div>
<nav class="nav">
  <a href="javascript:G(0)" id="nb0" class="on"><span class="ic">&#128202;</span>Ozet</a>
  <a href="javascript:G(1)" id="nb1"><span class="ic">&#127806;</span>Hasat</a>
  <a href="javascript:G(2)" id="nb2"><span class="ic">&#128184;</span>Gider</a>
  <a href="javascript:G(3)" id="nb3"><span class="ic">&#128119;</span>Isci</a>
  <a href="javascript:G(4)" id="nb4"><span class="ic">&#129514;</span>Ilac</a>
  <a href="javascript:G(5)" id="nb5"><span class="ic">&#127807;</span>Tarla</a>
  <a href="javascript:G(7)" id="nb7"><span class="ic">&#127807;</span>G&#252;bre</a>
  <a href="javascript:G(8)" id="nb8"><span class="ic">&#128202;</span>Rapor</a>
  <a href="javascript:G(6)" id="nb6"><span class="ic">&#9881;</span>Ayarlar</a>
</nav>
<button class="fab" id="fab" onclick="FC()">+</button>
<div class="ts" id="ts"></div>
<div class="ov" id="ov" onclick="if(event.target===this)CM()"><div class="sh" id="sh"></div></div>
<div class="ov" id="ov2" style="z-index:60" onclick="if(event.target===this)CM2()"><div class="sh" id="sh2" style="height:80vh;display:flex;flex-direction:column"></div></div>
<script>
var V={};
var PG=0,EI=-1,BIN_KEY='',BIN_ID='',OTOKAYT_API=false,_otoApiTimer=null;
var _ilacFiltreTarla='',_ilacFiltreIlac='';
var _hasatFiltreTarla='',_hasatFiltreMeyve='';
var AKTIF_YIL=new Date().getFullYear().toString();
function yilListesi(){
  var yillar=[new Date().getFullYear().toString()];
  if(V.arsiv){Object.keys(V.arsiv).forEach(function(y){if(yillar.indexOf(y)<0)yillar.push(y);});}
  yillar.sort().reverse();
  return yillar;
}
try{
  if(window.Android&&Android.loadData){
    var _d=Android.loadData();
    if(_d&&_d.length>2){try{V=JSON.parse(_d);}catch(pe){V={};}}
  } else {
    var _ld=null;
    try{_ld=localStorage.getItem('ciftci_veri');}catch(_e){}
    if(_ld&&_ld.length>2){
      try{V=JSON.parse(_ld);}catch(pe){V={};}
    } else {
      // localStorage boşsa IndexedDB'den yükle
      try{
        var _idbReq=indexedDB.open('CiftciDB',1);
        _idbReq.onsuccess=function(e){
          try{
            var _gr=e.target.result.transaction('veri','readonly').objectStore('veri').get('main');
            _gr.onsuccess=function(){
              if(_gr.result&&_gr.result.json&&_gr.result.json.length>2){
                try{V=JSON.parse(_gr.result.json);}catch(pe){}
                // IDB'den gelince localStorage'a da yaz
                try{localStorage.setItem('ciftci_veri',_gr.result.json);}catch(e){}
                if(typeof R==='function')R();
              }
            };
          }catch(e){}
        };
      }catch(e){}
    }
  }
}catch(e){V={};}
// Aktif yılın verisini ana alanlara yükle
try{
  if(!V.arsiv)V.arsiv={};
  var _bugunkiYil=new Date().getFullYear().toString();
  // Eski format uyumluluğu: arsiv yoksa mevcut veriyi bu yıla taşı
  if(!V.arsiv[_bugunkiYil]&&(V.hasatKayitlari||V.giderler)){
    V.arsiv[_bugunkiYil]={hasatKayitlari:V.hasatKayitlari||[],giderler:V.giderler||[],isci:V.isci||{},ilac:V.ilac||{kayitlar:[]},tarlalar:V.tarlalar||[],gubre:V.gubre||{kayitlar:[]},bulutAyar:V.bulutAyar||{}};
  }
  AKTIF_YIL=_bugunkiYil;
  var _arsivVeri=V.arsiv[_bugunkiYil]||{};
  V.hasatKayitlari=_arsivVeri.hasatKayitlari||[];
  V.giderler=_arsivVeri.giderler||[];
  V.isci=_arsivVeri.isci||{};
  V.ilac=_arsivVeri.ilac||{kayitlar:[]};
  V.tarlalar=_arsivVeri.tarlalar||[];
  V.gubre=_arsivVeri.gubre||{kayitlar:[]};
  V.bulutAyar=_arsivVeri.bulutAyar||V.bulutAyar||{};
}catch(e){}  
try{if(V.bulutAyar){
  BIN_KEY=V.bulutAyar.apiKey||'';
  BIN_ID=V.bulutAyar.binId||'';
  SHEETS_URL=V.bulutAyar.sheetsUrl||'';
  OTOKAYT=V.bulutAyar.otoKayt===true;
  OTOKAYT_API=V.bulutAyar.otoKaytApi===true;
}}catch(e){}
// Açılışta API key/Bin ID'yi Android'den al (koda gömülü)
try{if(window.Android&&Android.getApiKey){var _ak=Android.getApiKey();var _bi=Android.getBinId();if(_ak)BIN_KEY=_ak;if(_bi)BIN_ID=_bi;}}catch(e){}
try{setTimeout(function(){otoBulutKontrol();},4000);}catch(e){}

try{if(V.ozelIlaclar&&V.ozelIlaclar.length){V.ozelIlaclar.forEach(function(x){if(ILACLAR.indexOf(x)<0)ILACLAR.push(x);});ILACLAR.sort();}}catch(e){}

function f(n){return Number(n||0).toLocaleString('tr-TR',{maximumFractionDigits:0});}
function fk(n){return Number(n||0).toFixed(1);}
function td(){return new Date().toISOString().split('T')[0];}
function uid(){return Math.random().toString(36).substr(2,9);}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function kullaniciBinYukle(){
  try{
    var isAdm=window.Android&&Android.isAdmin&&Android.isAdmin();
    if(isAdm)return; // Admin ortak bin kullanır
    var kulAd=window.Android&&Android.getKullaniciAd?Android.getKullaniciAd():'';
    if(!kulAd)return;
    // Kullanıcının bin'ini bul
    var rec=V; // ana kayıt
    var kullanicilar=rec.kullanicilar||[];
    for(var i=0;i<kullanicilar.length;i++){
      if(kullanicilar[i].ad===kulAd){
        if(kullanicilar[i].binId){
          BIN_ID=kullanicilar[i].binId;
          if(!V.bulutAyar)V.bulutAyar={};
          V.bulutAyar.binId=BIN_ID;
        }
        break;
      }
    }
  }catch(e){}
}
function kullaniciBinKaydet(binId){
  try{
    var kulAd=window.Android&&Android.getKullaniciAd?Android.getKullaniciAd():'';
    if(!kulAd||!binId)return;
    if(window.Android&&Android.kullaniciBinGuncelle){
      Android.kullaniciBinGuncelle(kulAd,binId);
    }
  }catch(e){}
}
function toast(msg){var t=document.getElementById('ts');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}
function sv(){
  try{
    if(!V.arsiv)V.arsiv={};
    // Mevcut yılı arşive yaz
    var guncelVeri={
      hasatKayitlari:V.hasatKayitlari||[],
      giderler:V.giderler||[],
      isci:V.isci||{},
      ilac:V.ilac||{kayitlar:[]},
      tarlalar:V.tarlalar||[],
      gubre:V.gubre||{kayitlar:[]},
      bulutAyar:V.bulutAyar||{}
    };
    V.arsiv[AKTIF_YIL]=guncelVeri;
    var json=JSON.stringify(V);
    if(window.Android){
      Android.saveData(json);
    } else {
      try{localStorage.setItem('ciftci_veri',json);}catch(le){}
      try{_idbSave(json);}catch(ie){}
    }
  }catch(e){toast('Kayit hatasi!');}
}
function yilDegistir(yil){
  AKTIF_YIL=yil;
  // Seçilen yılın verisini ana V'ye yükle
  var arsivVeri=(V.arsiv&&V.arsiv[yil])||{};
  V.hasatKayitlari=arsivVeri.hasatKayitlari||[];
  V.giderler=arsivVeri.giderler||[];
  V.isci=arsivVeri.isci||{};
  V.ilac=arsivVeri.ilac||{kayitlar:[]};
  V.tarlalar=arsivVeri.tarlalar||[];
  V.gubre=arsivVeri.gubre||{kayitlar:[]};
  yilSecGuncelle();
  R();
}
function yilSecGuncelle(){
  var sel=document.getElementById('yilSec');
  if(!sel)return;
  var yillar=yilListesi();
  var bugunkiYil=new Date().getFullYear().toString();
  if(yillar.indexOf(bugunkiYil)<0)yillar.unshift(bugunkiYil);
  sel.innerHTML=yillar.map(function(y){
    return '<option value="'+y+'"'+(y===AKTIF_YIL?' selected':'')+'>'+y+'</option>';
  }).join('');
}
function yeniYilBaslat(){
  var buYil=new Date().getFullYear();
  var yillar='';
  for(var y=buYil+1;y>=2020;y--){yillar+='<option value="'+y+'">'+y+'</option>';}
  OM('<h2>Yeni Yil Basalt</h2>'+
    '<div class="fr"><label>Yil Secin</label><select class="fi" id="yb_yil">'+yillar+'</select></div>'+
    '<div style="font-size:12px;color:#888;margin-bottom:12px">Tarlalar aktarilir, kayitlar sifirlanir.</div>'+
    '<button class="btn bg" onclick="yeniYilKaydet()">Basalt</button>'+
    '<button class="btn bk" onclick="CM()">Iptal</button>');
}
function yeniYilKaydet(){
  var yil=gv('yb_yil');
  if(!yil)return;
  if(!V.arsiv)V.arsiv={};
  V.arsiv[yil]={
    hasatKayitlari:[],giderler:[],
    isci:{isciler:(V.isci&&V.isci.isciler)||[],devamlar:[],cavusOdemeleri:[],varsayilanYovmiye:(V.isci&&V.isci.varsayilanYovmiye)||500},
    ilac:{kayitlar:[]},
    tarlalar:JSON.parse(JSON.stringify(V.tarlalar||[])),
    gubre:{kayitlar:[]},
    bulutAyar:V.bulutAyar||{}
  };
  CM();
  AKTIF_YIL=yil;
  yilDegistir(yil);
  sv();
  toast(yil+' yili baslatildi!');
}
function G(p){PG=p;for(var i=0;i<9;i++){var b=document.getElementById('nb'+i);if(b)b.className=(i===p?'on':'');}document.getElementById('fab').style.display=(p===0||p===6||p===8?'none':'flex');R();}
function R(){yilSecGuncelle();try{if(PG===0)p0();else if(PG===1)p1();else if(PG===2)p2();else if(PG===3)p3();else if(PG===4)p4();else if(PG===5)p5();else if(PG===6)p6();else if(PG===7)p7();else if(PG===8)p8();}catch(e){var em=e.message||String(e);document.getElementById('cnt').innerHTML='<div class="card" style="padding:20px"><p style="color:red;font-weight:700">Sayfa Hatasi (PG='+PG+'):</p><p style="color:red;font-size:12px;word-break:break-all">'+em+'</p></div>';document.getElementById('sub').textContent='HATA';}}
function FC(){
  if(PG===1){
    OM('<h2>Hasat Ekle</h2>'
      +'<button class="btn bg" onclick="CM();yH()" style="margin-bottom:8px">&#127806; Tek Tarla</button>'
      +'<button class="btn b2" onclick="CM();yHToplu()">&#127807; Toplu Tarla</button>');
  }
  else if(PG===2)yG();
  else if(PG===3)yD();
  else if(PG===4)yI();
  else if(PG===5)yT();
  else if(PG===7)yGB();
}
function OM(html){document.getElementById('sh').innerHTML=html;document.getElementById('ov').classList.add('open');}
function CM(){document.getElementById('ov').classList.remove('open');EI=-1;}
function OM2(html){document.getElementById('sh2').innerHTML=html;document.getElementById('ov2').classList.add('open');}
function CM2(){document.getElementById('ov2').classList.remove('open');}
var _onayFn=null;
function onay(fn){_onayFn=fn;OM('<h2 style="color:#e74c3c">Emin misiniz?</h2><p style="margin:14px 0;color:#555">Bu kayit silinecek.</p><button class="btn br" onclick="_onayFn&&_onayFn();_onayFn=null;CM()">Evet, Sil</button><button class="btn bk" onclick="CM()">Iptal</button>');}
function getToplam(x){var pk=x.girisTipi==='kg'?(x.piyasaTotalKg||0):(x.piyasaKasa||0)*(x.piyasaKasaKg||0);var ak=x.girisTipi==='kg'?(x.aromaTotalKg||0):(x.aromaKasa||0)*(x.aromaKasaKg||0);return {pk:pk,ak:ak,gel:pk*(x.piyasaFiyat||0)+ak*(x.aromaFiyat||0)};}

// OZET & ANALZ
function p0(){try{
  document.getElementById('sub').textContent='Analiz yukleniyor...';
  var h=V.hasatKayitlari||[],g=V.giderler||[],tl=V.tarlalar||[];
  var iv=V.isci||{},devamlar=iv.devamlar||[],isciList=iv.isciler||[];
  var cavOd=iv.cavusOdemeleri||[],ilacKayit=(V.ilac&&V.ilac.kayitlar)||[];
  var yov=iv.varsayilanYovmiye||500;

  // ── Temel toplamlar ──
  var topGel=0,topPiyasaKg=0,topAromaKg=0;
  h.forEach(function(x){var t=getToplam(x);topGel+=t.gel;topPiyasaKg+=t.pk;topAromaKg+=t.ak;});
  var topGid=g.reduce(function(s,x){return s+Number(x.tutar||0);},0);
  var topCav=cavOd.reduce(function(s,o){return s+Number(o.tutar||0);},0);
  var topIsciHak=devamlar.reduce(function(s,d){return s+Number(d.uygulanenUcret||0);},0);
  var topGidTum=topGid+topCav;
  var kar=topGel-topGidTum;
  var topKg=topPiyasaKg+topAromaKg;

  document.getElementById('sub').textContent=tl.length+' tarla | '+h.length+' hasat | '+g.length+' gider';

  // ── BÖLÜM SEÇİCİ ──
  var bolum=window._analizBolum||0;
  function tabBtn(i,ad){
    return '<button onclick="window._analizBolum='+i+';R()" style="flex:1;padding:10px 4px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:'+(bolum===i?'#27ae60':'#eee')+';color:'+(bolum===i?'#fff':'#555')+'">'+ad+'</button>';
  }
  var html='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    tabBtn(0,'Genel')+tabBtn(1,'Hasat')+tabBtn(2,'Gider')+tabBtn(3,'Isci')+tabBtn(4,'Ilac')+tabBtn(5,'Gubre')+'</div>';

  // ── GENEL ANALİZ ──
  if(bolum===0){
    // Özet kartlar
    html+='<div class="mg">'+
      '<div class="mc"><div class="l">Toplam Gelir</div><div class="v" style="color:#27ae60">TL '+f(topGel)+'</div></div>'+
      '<div class="mc"><div class="l">Toplam Gider</div><div class="v" style="color:#e74c3c">TL '+f(topGidTum)+'</div></div>'+
      '<div class="mc fc"><div class="l">'+(kar>=0?'NET KAR':'NET ZARAR')+'</div><div class="v" style="color:'+(kar>=0?'#27ae60':'#e74c3c')+'">TL '+f(Math.abs(kar))+'</div></div>'+
      '<div class="mc"><div class="l">Toplam KG</div><div class="v">'+fk(topKg)+'</div></div>'+
      '<div class="mc"><div class="l">Kg Basi Kar</div><div class="v" style="color:'+(topKg>0&&kar/topKg>=0?'#27ae60':'#e74c3c')+'">'+(topKg>0?'TL '+fk(kar/topKg):'--')+'</div></div>'+
      '<div class="mc"><div class="l">Gelir/Gider</div><div class="v">'+(topGidTum>0?'%'+Math.round(topGel/topGidTum*100):'--')+'</div></div>'+
      '</div>';

    // Aylık kar/zarar tablosu
    var aylik={};
    h.forEach(function(x){var ay=(x.tarih||'').substring(0,7);if(!ay)return;if(!aylik[ay])aylik[ay]={gel:0,gid:0,kg:0};var t=getToplam(x);aylik[ay].gel+=t.gel;aylik[ay].kg+=t.pk+t.ak;});
    g.forEach(function(x){var ay=(x.tarih||'').substring(0,7);if(!ay)return;if(!aylik[ay])aylik[ay]={gel:0,gid:0,kg:0};aylik[ay].gid+=Number(x.tutar||0);});
    cavOd.forEach(function(o){var ay=(o.tarih||'').substring(0,7);if(!ay)return;if(!aylik[ay])aylik[ay]={gel:0,gid:0,kg:0};aylik[ay].gid+=Number(o.tutar||0);});

function ilacDozHesap(i){
  var d100=parseFloat(document.getElementById('ild'+i).value)||0;
  var topSu=parseFloat(document.getElementById('i_topsu')&&document.getElementById('i_topsu').value)||0;
  var donSu=parseFloat(document.getElementById('i_donumsu')&&document.getElementById('i_donumsu').value)||0;
  var dr=document.getElementById('ildr'+i);
  if(!dr)return;
  var satirlar=[];
  if(d100>0)satirlar.push('100lt: '+d100+'ml');
  if(d100>0&&topSu>0)satirlar.push('Toplam: '+(d100*topSu/100).toFixed(0)+'ml');
  if(d100>0&&donSu>0)satirlar.push('Donume: '+(d100*donSu/100).toFixed(0)+'ml');
  dr.textContent=satirlar.join(' | ');
}

}
function iGetDonum(){
  var tarlaEl=document.getElementById('i1');
  if(!tarlaEl||!tarlaEl.value||!V.tarlalar)return 0;
  for(var _i=0;_i<V.tarlalar.length;_i++){if(V.tarlalar[_i].ad===tarlaEl.value)return parseFloat(V.tarlalar[_i].donum)||0;}
  return 0;
}
function iGuncelleSonuc(){
  var donum=iGetDonum();
  var donumSu=parseFloat(document.getElementById('i_donumsu').value)||0;
  var topSu=parseFloat(document.getElementById('i_topsu').value)||0;
  var d100=parseFloat(document.getElementById('i_d100').value)||0;
  var dton=parseFloat(document.getElementById('i_dton').value)||0;
  var sonucDiv=document.getElementById('i_sonuc');
  if(!sonucDiv)return;

  // Toplam su hesapla
  var gercekTopSu=topSu||(donumSu>0&&donum>0?donumSu*donum:0);

  // Toplam ilaç miktarı hesapla
  // d100: ml/100lt su → toplamIlac = gercekTopSu/100 * d100 (ml)
  // dton: ml/ton → toplamIlac = gercekTopSu * dton / 1000 (ml)
  var toplamMl=0;
  if(d100>0&&gercekTopSu>0) toplamMl=gercekTopSu/100*d100;
  else if(dton>0&&gercekTopSu>0) toplamMl=gercekTopSu*dton/1000;

  var satirlar=[];
  if(donumSu>0)satirlar.push(donumSu.toFixed(0)+' lt/donum');
  if(gercekTopSu>0)satirlar.push(gercekTopSu.toFixed(0)+' lt toplam su');
  if(d100>0)satirlar.push(d100.toFixed(1)+' ml/100lt');
  if(dton>0)satirlar.push(dton.toFixed(1)+' ml/ton');

  // Toplam ilaç göster
  if(toplamMl>0){
    // Birim dönüşümü
  var birimEl=document.getElementById('i_d100birim');
  var birim=birimEl?birimEl.value:'ml';
  var toplamGr=birim==='kg'?toplamMl*1000:toplamMl; // kg→gr, ml ve gr aynı
    var goster='';
    if(toplamGr>=1000) goster=(toplamGr/1000).toFixed(2)+' kg';
    else goster=toplamGr.toFixed(0)+' ml (gr)';
    satirlar.push('→ TOPLAM ILAC: '+goster);
    sonucDiv.style.background='#1e8449';
  } else {
    sonucDiv.style.background='#27ae60';
  }

  sonucDiv.textContent=satirlar.length?satirlar.join(' | '):'';
}
function iHDS(){

  iGuncelleSonuc();
}

function etiketPollBaslat(idx){

function etkDuzenle(i){
  var cb=document.getElementById('etk_'+i);
  var txt=document.getElementById('etk_txt_'+i);
  if(!cb||!txt)return;
  var mevcutDeger=cb.value;
  var yeniDeger=txt.textContent;
  // Inline düzenleme
  txt.contentEditable='true';
  txt.style.background='#fff';
  txt.style.outline='2px solid #27ae60';
  txt.style.borderRadius='4px';
  txt.style.padding='2px 6px';
  txt.focus();
  // Seçimi sona al
  var r=document.createRange();
  r.selectNodeContents(txt);
  r.collapse(false);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(r);
  // Enter ile kaydet
  txt.onkeydown=function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      var yeni=txt.textContent.trim();
      if(yeni){cb.value=yeni;}
      txt.contentEditable='false';
      txt.style.background='';
      txt.style.outline='';
      txt.style.padding='';
    } else if(e.key==='Escape'){
      txt.textContent=mevcutDeger;
      txt.contentEditable='false';
      txt.style.background='';
      txt.style.outline='';
      txt.style.padding='';
    }
  };
  txt.onblur=function(){
    var yeni=txt.textContent.trim();
    if(yeni){cb.value=yeni;}
    txt.contentEditable='false';
    txt.style.background='';
    txt.style.outline='';
    txt.style.padding='';
  };
}

  }
  CM2();

  secili.forEach(function(s){

      if(!V.ozelIlaclar)V.ozelIlaclar=[];
      if(V.ozelIlaclar.indexOf(temizS)<0){
        V.ozelIlaclar.push(temizS);
        if(window.Android)Android.saveData(JSON.stringify(V));
      }
    }
  });
  // Alana yaz - kullanici kaydet butonuna basar
  if(el){
    el.value=secili[0];
    el.readOnly=false;
    el.focus();
    // İmleci sona al
    var len=el.value.length;
    el.setSelectionRange(len,len);

  for(var si=1;si<secili.length;si++){
    ilacEkle();

function resimKucult(dataUri, cb){
  // Fotoğrafı max 600px genişliğe ve %70 kaliteye küçült
  try{
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=600;
      var ratio=Math.min(1, maxW/img.width);
      canvas.width=img.width*ratio;
      canvas.height=img.height*ratio;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL('image/jpeg',0.7));
    };
    img.src=dataUri;
  }catch(e){cb(dataUri);}
}
function iFotoSec(){
  fotoSec(function(d){
    resimKucult(d, function(kucuk){
      var prev=document.getElementById('i_foto_prev');
      if(prev)prev.innerHTML='<img src="'+kucuk+'" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover">';
      window._ilacFoto=kucuk;
    });
  });
}
function fotoSec(cb){
  _fotoCB=cb;
  if(window.Android&&Android.fotoSec){
    Android.fotoSec();
  } else {
    // Web/PWA - gizli file input ile
    var inp=document.getElementById('_fotoInput');
    if(!inp){
      inp=document.createElement('input');
      inp.type='file';
      inp.id='_fotoInput';
      inp.accept='image/*';
      inp.capture='environment'; // arka kamera
      inp.style.display='none';
      inp.onchange=function(){
        if(!this.files||!this.files[0])return;
        var reader=new FileReader();
        reader.onload=function(e){
          if(typeof _fotoCB==='function') _fotoCB(e.target.result);
        };
        reader.readAsDataURL(this.files[0]);
      };
      document.body.appendChild(inp);
    }
    inp.value='';
    inp.click();
  }
}

function _fotoSizKopyala(obj){
  // Fotoğraf verilerini çıkararak derin kopya al (bulut için)
  var str=JSON.stringify(obj);
  var parsed=JSON.parse(str);
  try{
    if(parsed.arsiv){
      Object.keys(parsed.arsiv).forEach(function(yil){
        var v=parsed.arsiv[yil];
        if(v.hasatKayitlari)v.hasatKayitlari.forEach(function(h){delete h.foto;});
        if(v.ilac&&v.ilac.kayitlar)v.ilac.kayitlar.forEach(function(k){delete k.foto;});
      });
    }
    if(parsed.hasatKayitlari)parsed.hasatKayitlari.forEach(function(h){delete h.foto;});
    if(parsed.ilac&&parsed.ilac.kayitlar)parsed.ilac.kayitlar.forEach(function(k){delete k.foto;});
  }catch(e){}
  return parsed;
}
function _bulutPUT(binId,veri,sonCb){
  // Mevcut bin'den admin bilgilerini koru, sonra üzerine yaz
  fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{headers:{'X-Master-Key':BIN_KEY}})
    .then(function(r){return r.json();})
    .then(function(mevcut){
      var yeni=_fotoSizKopyala(veri); // fotoğraflar olmadan gönder
      if(mevcut.record){
        if(mevcut.record.kullanicilar)yeni.kullanicilar=mevcut.record.kullanicilar;
        if(mevcut.record.adminSifre)yeni.adminSifre=mevcut.record.adminSifre;
        if(mevcut.record.adminAd)yeni.adminAd=mevcut.record.adminAd;
      }
      return fetch('https://api.jsonbin.io/v3/b/'+binId,{method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
        body:JSON.stringify(yeni)});
    }).then(function(r){return r.json();})
    .then(function(d){if(sonCb)sonCb(d.metadata?true:false,d.message||'');})
    .catch(function(){if(sonCb)sonCb(false,'Baglanti hatasi');});
}

function ozelIlacSil(x){

function excelAktar(tip){
  if(typeof XLSX==='undefined'){toast('Excel kutuphanesi yuklenemedi');return;}
  var wb=XLSX.utils.book_new();
  var tarih=new Date().toLocaleDateString('tr-TR').replace(/\./g,'-');
  var tl=V.tarlalar||[];

  function tarlaAd(idx){var t=tl[idx];return t?t.ad:('Tarla '+(idx+1));}

  if(tip==='hasat'||tip==='tamami'){
    var rows=(V.hasatKayitlari||[]).map(function(h){
      var tot=getToplam(h);
      return {
        'Tarih':h.tarih||'',
        'Tarla':tarlaAd(h.tarlaIndex),
        'Piyasa KG':Number((tot.pk||0).toFixed(1)),
        'Aroma KG':Number((tot.ak||0).toFixed(1)),
        'Toplam KG':Number(((tot.pk||0)+(tot.ak||0)).toFixed(1)),
        'Piyasa Fiyat TL/kg':h.piyasaFiyat||0,
        'Aroma Fiyat TL/kg':h.aromaFiyat||0,
        'Toplam Gelir TL':Number((tot.gel||0).toFixed(2)),
        'Not':h.not||''
      };
    }).sort(function(a,b){return a['Tarih'].localeCompare(b['Tarih']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Hasat');
  }
  if(tip==='gider'||tip==='tamami'){
    var rows2=(V.giderler||[]).map(function(g){
      return {
        'Tarih':g.tarih||'',
        'Kategori':g.kategori||'',
        'Aciklama':g.aciklama||'',
        'Tutar TL':Number(g.tutar||0),
        'Not':g.not||''
      };
    }).sort(function(a,b){return a['Tarih'].localeCompare(b['Tarih']);});
    var cavOd=((V.isci&&V.isci.cavusOdemeleri)||[]).map(function(o){
      return {
        'Tarih':o.tarih?o.tarih.split('T')[0]:'',
        'Kategori':'Isci-Cavus',
        'Aciklama':'Cavus Odemesi'+(o.not?' - '+o.not:''),
        'Tutar TL':Number(o.tutar||0),
        'Not':''
      };
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows2.concat(cavOd)),'Gider');
  }
  if(tip==='isci'||tip==='tamami'){
    var iv=V.isci||{};
    var isciList=iv.isciler||[];
    var devamlar=iv.devamlar||[];
    var rows3=devamlar.map(function(d){
      var isc=null;
      for(var i=0;i<isciList.length;i++){if(isciList[i].id===d.isciId){isc=isciList[i];break;}}
      return {
        'Tarih':d.tarih?d.tarih.split('T')[0]:'',
        'Isci Adi':isc?isc.ad:d.isciId,
        'Ucret TL':Number(d.uygulanenUcret||0)
      };
    }).sort(function(a,b){return a['Tarih'].localeCompare(b['Tarih']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows3),'Isci Devam');
  }
  if(tip==='ilac'||tip==='tamami'){
    var rows4=((V.ilac&&V.ilac.kayitlar)||[]).map(function(k){
      var ilaclar=(k.ilaclar||[]).filter(function(x){return x.ad;}).map(function(x){return x.ad;}).join(' + ');
      return {
        'Tarih':k.tarih||'',
        'Tarla':k.tarla||'',
        'Meyve Turu':k.meyveTuru||'',
        'Etken Maddeler':ilaclar,
        'Su Miktari lt':k.su||'',
        'Not':k.not||''
      };
    }).sort(function(a,b){return a['Tarih'].localeCompare(b['Tarih']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows4),'Ilac');
  }
  if(tip==='tamami'&&tl.length){
    var rows5=tl.map(function(t){
      return {'Tarla Adi':t.ad,'Meyve':t.meyve||'','Agac Sayisi':t.agacSayisi||0,'Donum':t.donum||0,'Not':t.not||''};
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows5),'Tarlalar');
  }

  if(wb.SheetNames.length===0){toast('Aktar edilecek kayit yok');return;}

  var dosyaAdi='CiftciTakip_'+tip+'_'+tarih+'.xlsx';
  try{
    var wbout=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    if(window.Android&&Android.saveExcel){
      var sonuc=Android.saveExcel(wbout,dosyaAdi);
      if(sonuc.indexOf('OK')===0)toast('Downloads/'+dosyaAdi+' kaydedildi!');
      else toast(sonuc);
    } else {
      toast('Excel kaydetme desteklenmiyor');
    }
  }catch(e){toast('Excel hatasi: '+e.message);}
}

  var sezonAdi = ay<=3?'Kış':ay<=6?'İlkbahar':ay<=9?'Yaz':'Sonbahar';

  function filtreAy(arr){return arr.filter(function(x){return x.tarih&&x.tarih.startsWith(ayBas);});}
  function filtreSezon(arr){return arr.filter(function(x){return x.tarih&&sezonAylar.some(function(m){return x.tarih.startsWith(yil+'-'+m);});});}

  var sH,sG,sBaslik;

  else{sH=filtreAralik(h,haftaBasStr,haftaBitStr);sG=filtreAralik(g,haftaBasStr,haftaBitStr);sBaslik='📆 Bu Hafta';}

  function hes(hs,gs){

function aramaYap(q){
  q=(q||'').toLowerCase().trim();
  var el=document.getElementById('aramaSonuc');
  if(!el) return;
  if(!q){el.innerHTML='<p style="color:#aaa;text-align:center;padding:28px;font-size:14px">Aramak istediğiniz kelimeyi yazın...</p>';return;}
  var h=V.hasatKayitlari||[],g=V.giderler||[];
  var ilacK=(V.ilac&&V.ilac.kayitlar)||[],gubreK=(V.gubre&&V.gubre.kayitlar)||[];
  var out='';
  function kart(b,a){return '<div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.08)"><div style="font-weight:700;font-size:14px">'+b+'</div><div style="font-size:12px;color:#888;margin-top:2px">'+a+'</div></div>';}
  function bas(ikon,ad,n){return '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin:10px 0 5px">'+ikon+' '+ad+' ('+n+')</div>';}
  var hRes=h.filter(function(x){return [(x.meyve||''),(x.tarla||''),(x.musteri||''),(x.not||'')].some(function(s){return s.toLowerCase().includes(q);});});
  if(hRes.length){out+=bas('🌾','Hasat',hRes.length);hRes.slice(0,6).forEach(function(x){out+=kart((x.meyve||'?')+' — '+(x.tarla||'?'),(x.tarih||'')+' · '+(x.kg||0)+' kg · '+f(parseFloat(x.tutar)||0));});if(hRes.length>6)out+='<div style="font-size:12px;color:#aaa;text-align:center;margin-bottom:6px">+'+(hRes.length-6)+' kayıt daha</div>';}
  var gRes=g.filter(function(x){return [(x.kategori||''),(x.aciklama||''),(x.tarla||'')].some(function(s){return s.toLowerCase().includes(q);});});
  if(gRes.length){out+=bas('💸','Gider',gRes.length);gRes.slice(0,6).forEach(function(x){out+=kart((x.kategori||'?')+(x.tarla?' · '+x.tarla:''),(x.tarih||'')+' · '+f(parseFloat(x.tutar)||0)+(x.aciklama?' · '+x.aciklama:''));});if(gRes.length>6)out+='<div style="font-size:12px;color:#aaa;text-align:center;margin-bottom:6px">+'+(gRes.length-6)+' kayıt daha</div>';}
  var iRes=ilacK.filter(function(x){return [(x.ilac||''),(x.tarla||''),(x.not||'')].some(function(s){return s.toLowerCase().includes(q);});});
  if(iRes.length){out+=bas('🧪','İlaç',iRes.length);iRes.slice(0,4).forEach(function(x){out+=kart((x.ilac||'?')+' — '+(x.tarla||'?'),x.tarih||'');});}
  var gbrRes=gubreK.filter(function(x){return [(x.urun||''),(x.tarla||'')].some(function(s){return s.toLowerCase().includes(q);});});
  if(gbrRes.length){out+=bas('🌱','Gübre',gbrRes.length);gbrRes.slice(0,4).forEach(function(x){out+=kart((x.urun||'?')+' — '+(x.tarla||'?'),(x.tarih||'')+' · '+(x.doz||'')+' '+(x.birim||''));});}
  if(!out) out='<p style="color:#aaa;text-align:center;padding:28px;font-size:14px">&#34;'+q+'&#34; için sonuç bulunamadı</p>';
  el.innerHTML=out;
}

function kHToplu(){

function ilacPlan(){
  var kayitlar=(V.ilac&&V.ilac.kayitlar)||[];
  if(!kayitlar.length){toast('Hic ilac kaydi yok!');return;}
  var grup={};
  kayitlar.forEach(function(k){
    var ilaclar=[];
    if(k.ilaclar&&k.ilaclar.length)ilaclar=k.ilaclar.map(function(x){return x.ad||String(x);});
    else if(k.ilac)ilaclar=[k.ilac];
    ilaclar.forEach(function(ad){
      if(!ad)return;
      if(!grup[ad])grup[ad]={lt:0,kayit:0,min:'',max:''};
      grup[ad].lt+=(parseFloat(k.su)||0);
      grup[ad].kayit++;
      if(k.tarih){if(!grup[ad].min||k.tarih<grup[ad].min)grup[ad].min=k.tarih;if(!grup[ad].max||k.tarih>grup[ad].max)grup[ad].max=k.tarih;}
    });
  });
  var sirali=Object.keys(grup).sort(function(a,b){return grup[b].lt-grup[a].lt;});
  var rows='';
  sirali.forEach(function(ad,idx){
    var g=grup[ad];
    rows+='<div style="background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
        '<div style="font-weight:700;font-size:15px">'+ad+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:#2980b9">'+(g.lt>0?Math.round(g.lt)+'lt':'?')+'</div>'+
      '</div>'+
      '<div style="font-size:11px;color:#888;margin-bottom:8px">'+g.kayit+' uygulama'+(g.min?' | '+g.min.substring(0,7)+' ~ '+g.max.substring(0,7):'')+' </div>'+
      '<div style="display:flex;gap:6px;align-items:center">'+
        '<input type="number" id="ha'+idx+'" placeholder="Ambalaj ml veya lt" min="0" style="flex:1;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px">'+
        '<select id="bi'+idx+'" style="padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px"><option value="ml">ml</option><option value="lt">lt</option></select>'+
        '<button id="hb'+idx+'" data-lt="'+Math.round(g.lt)+'" data-idx="'+idx+'" onclick="ilacAmbalajHesap(this)" style="padding:8px 12px;border:none;border-radius:8px;background:#27ae60;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Hesapla</button>'+
      '</div>'+
      '<div id="sr'+idx+'" style="margin-top:8px;font-size:13px;color:#27ae60;font-weight:700"></div>'+
    '</div>';
  });
  OM2('<div style="flex:1;overflow-y:auto;padding:4px 0">'+
    '<h2 style="margin:0 0 4px">Ilac Analizi</h2>'+
    '<p style="font-size:12px;color:#888;margin-bottom:12px">Ambalaj hacmini gir, kac adet almaniz gerektigini hesaplar.</p>'+
    rows+'</div>');
}

function ilacAmbalajHesap(btn){
  var idx=btn.getAttribute('data-idx');
  var toplamLt=parseFloat(btn.getAttribute('data-lt'))||0;
  var hacim=parseFloat(document.getElementById('ha'+idx).value)||0;
  var birim=document.getElementById('bi'+idx).value;
  var sonuc=document.getElementById('sr'+idx);
  if(!hacim){toast('Ambalaj hacmini gir!');return;}
  var hacimLt=birim==='ml'?hacim/1000:hacim;
  var adet=Math.ceil(toplamLt/hacimLt);
  sonuc.innerHTML='&#10003; '+toplamLt+'lt / '+(birim==='ml'?hacim+'ml':hacim+'lt')+' = <b>'+adet+' ambalaj</b> gerekir';
}

  OM('<h2>Ozel Urunler</h2>'
    +'<div id="ozelUrunListesi">'+rows+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:12px">'
    +'<input class="fi" type="text" id="yeniUrunInp" placeholder="Yeni urun adi" style="flex:1">'
    +'<button onclick="ozelUrunEkle()" style="padding:10px 14px;border:none;border-radius:8px;background:#27ae60;color:#fff;font-weight:700;cursor:pointer">Ekle</button>'
    +'</div>');
}

function ozelUrunEkle(){
  var el=document.getElementById('yeniUrunInp');
  var ad=(el?el.value:'').trim();
  if(!ad){toast('Urun adi girin!');return;}
  var ekler=JSON.parse(localStorage.getItem('ozelMeyveler')||'[]');
  if(ekler.indexOf(ad)>=0){toast('Bu urun zaten var!');return;}
  ekler.push(ad);
  localStorage.setItem('ozelMeyveler',JSON.stringify(ekler));
  // MEYVELER listesini güncelle
  MEYVELER.splice(MEYVELER.length-1,0,ad); // 'diger'den önce ekle
  toast(ad+' eklendi!');
  ozelUrunYonet();
}

function ozelUrunSil(idx){
  var ekler=JSON.parse(localStorage.getItem('ozelMeyveler')||'[]');
  var silinen=ekler[idx];
  ekler.splice(idx,1);
  localStorage.setItem('ozelMeyveler',JSON.stringify(ekler));
  var mi=MEYVELER.indexOf(silinen);
  if(mi>=0)MEYVELER.splice(mi,1);
  toast(silinen+' silindi!');
  ozelUrunYonet();
}

</script>

// IndexedDB - PWA kalıcı depolama
function _idbSave(json){
  try{
    var req=indexedDB.open('CiftciDB',1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('veri',{keyPath:'id'});};
    req.onsuccess=function(e){
      var tx=e.target.result.transaction('veri','readwrite');
      tx.objectStore('veri').put({id:'main',json:json});
    };
  }catch(e){}
}
function _idbLoad(cb){
  try{
    var req=indexedDB.open('CiftciDB',1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('veri',{keyPath:'id'});};
    req.onsuccess=function(e){
      var gr=e.target.result.transaction('veri','readonly').objectStore('veri').get('main');
      gr.onsuccess=function(){cb(gr.result?gr.result.json:null);};
      gr.onerror=function(){cb(null);};
    };
    req.onerror=function(){cb(null);};
  }catch(e){cb(null);}
}

</script>
